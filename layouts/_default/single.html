{{ define "main" }}
<div class="page-header">
  <div class="container">
    <h1 class="page-header__title">{{ .Title }}</h1>
    {{ with .Params.subtitle }}<p class="page-header__subtitle">{{ . }}</p>{{ end }}
  </div>
</div>
<div class="container">
  <article class="article">
    <div class="article__body">
      {{ .Content }}
    </div>
  </article>
</div>
{{ end }}
