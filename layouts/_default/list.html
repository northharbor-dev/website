{{ define "main" }}
<div class="page-header">
  <div class="container">
    <h1 class="page-header__title">{{ .Title }}</h1>
    {{ with .Params.subtitle }}<p class="page-header__subtitle">{{ . }}</p>{{ end }}
  </div>
</div>
<div class="section">
  <div class="container">
    {{ .Content }}
  </div>
</div>
{{ end }}
